<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>AI Video Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ff6b35'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@300;400&display=swap');

:root {
  --bg: #f5f1ec;
  --surface: #ffffff;
  --surface2: #f9f6f2;
  --border: #e4ddd4;
  --text: #1a1714;
  --muted: #8c8279;
  --accent: #ff6b35;
  --r: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

#coverScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.cover-inner {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.cover-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.logo-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 2.5s ease infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.cover-brand-text {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--muted);
  text-transform: uppercase;
}

.cover-hero { text-align: center; }

.cover-title {
  font-size: 38px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 12px;
}

.cover-title em {
  font-style: normal;
  color: var(--accent);
}

.cover-sub {
  font-size: 17px;
  line-height: 1.5;
  color: var(--muted);
  max-width: 440px;
  margin: 0 auto;
}

.cover-pillars {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.cover-pillar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 14px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.cover-pillar-icon { font-size: 26px; line-height: 1; }
.cover-pillar-title { font-size: 13px; font-weight: 700; color: var(--text); }
.cover-pillar-desc { font-size: 12px; line-height: 1.4; color: var(--muted); }

.cover-config {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.cover-field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 6px;
}

.cover-field textarea,
.cover-field input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border 0.15s;
  resize: none;
}

.cover-field textarea {
  min-height: 64px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}

.cover-field input {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}

.cover-field textarea:focus,
.cover-field input:focus { border-color: var(--accent); }

.cover-cta {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 18px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 4px 14px rgba(255,107,53,0.25);
}

.cover-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(255,107,53,0.32);
}

.cover-cta:active { transform: translateY(0); }

@media (max-width: 480px) {
  .cover-title { font-size: 30px; }
  .cover-pillars { grid-template-columns: 1fr; }
  .cover-pillar { flex-direction: row; text-align: left; }
}
</style>
</head>
<body>

<div id="coverScreen">
  <div class="cover-inner">
    <div class="cover-brand">
      <div class="logo-dot"></div>
      <span class="cover-brand-text">AI Video Studio</span>
    </div>

    <div class="cover-hero">
      <h1 class="cover-title">Vídeos UGC con IA<br>en <em>5 minutos</em></h1>
      <p class="cover-sub">Crea clips para redes sin grabar, sin actores y sin equipo. Tú diriges, la IA produce.</p>
    </div>

    <div class="cover-pillars">
      <div class="cover-pillar">
        <span class="cover-pillar-icon">🎭</span>
        <span class="cover-pillar-title">Tu elenco</span>
        <span class="cover-pillar-desc">Personajes IA reutilizables</span>
      </div>
      <div class="cover-pillar">
        <span class="cover-pillar-icon">🎬</span>
        <span class="cover-pillar-title">Tu guion</span>
        <span class="cover-pillar-desc">Hooks, demos, CTAs y otros formatos</span>
      </div>
      <div class="cover-pillar">
        <span class="cover-pillar-icon">📲</span>
        <span class="cover-pillar-title">Tu vídeo</span>
        <span class="cover-pillar-desc">Listo para publicar, sin edición.</span>
      </div>
    </div>

    <div class="cover-config">
      <div class="cover-field">
        <label>¿Qué vendes?</label>
        <textarea id="coverProducto" placeholder="Ej: Formación online para crear avatares IA y escalar contenido para marcas"></textarea>
      </div>
      <div class="cover-field">
        <label>Webhook n8n</label>
        <input type="text" id="coverWebhook" placeholder="https://n8n.prxy.studio/webhook/ai-video-pipeline" spellcheck="false">
      </div>
    </div>

    <button class="cover-cta" onclick="startWizard()">Empezar a crear →</button>
  </div>
</div>

<script>
const DEFAULT_WEBHOOK = 'https://n8n.prxy.studio/webhook/ai-video-pipeline';

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('coverProducto').value = localStorage.getItem('producto') || '';
  document.getElementById('coverWebhook').value = localStorage.getItem('n8n_webhook_url') || '';
});

function startWizard() {
  const prod = document.getElementById('coverProducto').value.trim();
  const url = document.getElementById('coverWebhook').value.trim() || DEFAULT_WEBHOOK;
  localStorage.setItem('producto', prod);
  localStorage.setItem('n8n_webhook_url', url);
  window.location.href = './crear/';
}
</script>

</body>
</html>
